<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Aqua Flow – Smart IoT Water Management & Monitoring System</title>
    <meta name="description" content="Optimize water usage with Aqua Flow. Real-time IoT water monitoring, leak detection, and smart control for homes and businesses. Save water, reduce costs." />
    <meta name="keywords" content="smart water management system, IoT water monitoring, real-time water tracking, water usage control, leak detection, water conservation" />
    <link rel="canonical" href="https://aquaflow.example.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aquaflow.example.com/" />
    <meta property="og:title" content="Aqua Flow – Smart IoT Water Management System" />
    <meta property="og:description" content="Real-time water tracking and smart usage control. Save money and protect your property with IoT water monitoring." />
    <meta property="og:image" content="/assets/aquaflow-logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aquaflow.example.com/" />
    <meta property="twitter:title" content="Aqua Flow – Smart IoT Water Management System" />
    <meta property="twitter:description" content="Real-time water tracking and smart usage control. Save money and protect your property with IoT water monitoring." />
    <meta property="twitter:image" content="/assets/aquaflow-logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Aqua Flow",
      "description": "An intelligent IoT-based water management system for real-time monitoring and control.",
      "brand": {
        "@type": "Brand",
        "name": "Aqua Flow"
      },
      "category": "Smart Water Management / IoT",
      "offers": {
        "@type": "Offer",
        "url": "https://aquaflow.example.com/",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
